name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # macos-latest runner 默认激活的 Xcode 已是最新稳定版（目前 16.x），
      # 足以构建本项目。历史上这里硬编码 /Applications/Xcode_26.app，但 runner
      # 从未分发过该版本，导致 release 一触发就失败——故删去手动切换步骤。
      # 如未来需要锁定特定 Xcode 版本，改用：
      #   sudo xcode-select -s $(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: scripts/build-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Compute SHA256
        id: sha
        run: |
          sha=$(shasum -a 256 "build/SliceAI-lite-${{ steps.ver.outputs.version }}.dmg" | awk '{print $1}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SliceAI-lite-${{ steps.ver.outputs.version }}.dmg
          path: build/SliceAI-lite-${{ steps.ver.outputs.version }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/SliceAI-lite-${{ steps.ver.outputs.version }}.dmg
          draft: true
          generate_release_notes: true
          body: |
            ## SliceAI-lite ${{ steps.ver.outputs.version }}

            **Unsigned DMG.** Installation steps:
            1. Mount the DMG and drag `SliceAI-lite.app` to `/Applications`
            2. First launch: Right-click -> Open (because unsigned)
               Or run: `xattr -d com.apple.quarantine /Applications/SliceAI-lite.app`
            3. Grant Accessibility permission when prompted
            4. Enter your OpenAI API key (or any OpenAI-compatible base URL + key)

            ### Checksum
            SHA256: `${{ steps.sha.outputs.sha }}`
